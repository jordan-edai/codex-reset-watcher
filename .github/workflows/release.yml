name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package app
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package app bundle
        run: ./script/package.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Codex.Reset.Watcher.v*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
